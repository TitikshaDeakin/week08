name: CD - Deploy Frontend to AKS

on:
  workflow_dispatch:
    inputs:
      product_api_ip:
        description: 'External IP of Product Service'
        required: true
        default: 'http://<ip_address>:8000'
      order_api_ip:
        description: 'External IP of Order Service'
        required: true
        default: 'http://<ip_address>:8001'

jobs:
  deploy_frontend:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubeconfig from secret
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          kubectl cluster-info

      - name: Docker login to ACR (admin credentials)
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login \
          ${{ secrets.ACR_LOGIN_SERVER }} \
          -u ${{ secrets.ACR_USERNAME }} --password-stdin


      - name: Inject Backend IPs into Frontend main.js
        run: |
          sed -i "s|_PRODUCT_API_URL_|${{ inputs.product_api_ip }}|g" frontend/main.js
          sed -i "s|_ORDER_API_URL_|${{ inputs.order_api_ip }}|g" frontend/main.js
          echo "--- Modified main.js content ---"
          cat frontend/main.js

      - name: Build and Push Frontend Image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest ./frontend/
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest

      - name: Deploy Frontend to AKS
        run: |
          cd k8s/
          kubectl apply -f frontend.yaml

      - name: Wait for Frontend LoadBalancer IP
        run: |
          FRONTEND_IP=""
          for i in $(seq 1 60); do
            FRONTEND_IP=$(kubectl get svc frontend-service-w08e1 -o jsonpath='{.status.loadBalancer.ingress[0].ip}' || true)
            if [[ -n "$FRONTEND_IP" ]]; then
              echo "Frontend Service IP: $FRONTEND_IP"
              break
            fi
            sleep 5
          done
          if [[ -z "$FRONTEND_IP" ]]; then
            echo "Error: Frontend LoadBalancer IP not assigned."
            exit 1
          fi
          echo "FRONTEND_IP=$FRONTEND_IP" >> $GITHUB_ENV

      - name: Output Frontend URL
        run: echo "Frontend available at: http://${{ env.FRONTEND_IP }}"
