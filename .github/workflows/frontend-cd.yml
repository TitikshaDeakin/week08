name: CD - Deploy Frontend to AKS

on:
  workflow_dispatch:
    inputs:
      product_api_ip:
        description: "External URL for Product API (e.g. http://<ip>:8000)"
        required: true
      order_api_ip:
        description: "External URL for Order API (e.g. http://<ip>:8001)"
        required: true

jobs:
  deploy_frontend:
    runs-on: ubuntu-latest
    environment: Production

    # derive the registry from your ACR name secret
    env:
      REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubeconfig from secret
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          kubectl cluster-info

      - name: Docker login to ACR (admin credentials)
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            $REGISTRY \
            -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Inject backend API URLs into frontend/main.js
        run: |
          # Replace placeholders in your frontend code
          # Adjust the file path/placeholders if your repo differs
          sed -i "s|_PRODUCT_API_URL_|${{ inputs.product_api_ip }}|g" frontend/main.js
          sed -i "s|_ORDER_API_URL_|${{ inputs.order_api_ip }}|g" frontend/main.js
          echo "--- main.js after replacement ---"
          tail -n +1 frontend/main.js | sed -n '1,120p'

      - name: Build and Push Frontend Image
        run: |
          docker build -t $REGISTRY/frontend:latest ./frontend/
          docker push $REGISTRY/frontend:latest

      - name: Deploy Frontend to AKS
        run: |
          cd k8s/
          # Apply optional configs if present
          if [ -f frontend-configmap.yaml ]; then kubectl apply -f frontend-configmap.yaml; fi
          if [ -f frontend-secrets.yaml ]; then kubectl apply -f frontend-secrets.yaml; fi
          # Your deployment/service manifest (adjust if your filenames differ)
          if [ -f frontend-deployment.yaml ]; then kubectl apply -f frontend-deployment.yaml; fi
          if [ -f frontend-service.yaml ]; then kubectl apply -f frontend-service.yaml; fi
          # Fallback if you keep a single combined yaml
          if [ -f frontend.yaml ]; then kubectl apply -f frontend.yaml; fi

      - name: Wait for Frontend LoadBalancer IP
        shell: bash
        run: |
          # discover the service by label
          SVC_NAME=$(kubectl get svc -l app=frontend -o jsonpath='{.items[0].metadata.name}')
          echo "Detected frontend service: $SVC_NAME"

          FRONTEND_IP=""
          for i in $(seq 1 60); do
            FRONTEND_IP=$(kubectl get svc "$SVC_NAME" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [[ -n "$FRONTEND_IP" ]]; then
              echo "Frontend Service IP: $FRONTEND_IP"
              break
            fi
            sleep 5
          done

          if [[ -z "$FRONTEND_IP" ]]; then
            echo "Error: Frontend LoadBalancer IP not assigned after timeout."
            kubectl get svc "$SVC_NAME" -o wide || true
            exit 1
          fi

          echo "FRONTEND_IP=$FRONTEND_IP" >> $GITHUB_ENV


      - name: Output Frontend URL
        run: |
          echo "Frontend available at: http://$FRONTEND_IP"

